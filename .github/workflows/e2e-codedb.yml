name: e2e-codedb

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test-e2e-codedb:
    name: test-e2e-codedb
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || !github.event.pull_request.head.repo.fork
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: Swatinem/rust-cache@v2
      - name: install codedb
        run: |
          mkdir -p "$HOME/bin"
          curl -fsSL "https://codedb.codegraff.com/v0.2.4/codedb-linux-x86_64" -o "$HOME/bin/codedb"
          chmod +x "$HOME/bin/codedb"
          echo "$HOME/bin" >> "$GITHUB_PATH"
        env:
          CODEDB_NO_TELEMETRY: "1"
      - name: run codedb e2e tests
        run: cargo test -p bridge-e2e --test codedb_e2e_tests -- --ignored --test-threads=1
